name: Sync Upstream

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check upstream for changes
        id: check
        run: |
          git remote add upstream https://github.com/redf0x1/camofox-browser.git
          git fetch upstream --quiet
          UPSTREAM_SHA=$(git rev-parse upstream/main)
          LOCAL_SHA=$(git rev-parse HEAD)
          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
          echo "local_sha=$LOCAL_SHA" >> $GITHUB_OUTPUT
          if [ "$UPSTREAM_SHA" != "$LOCAL_SHA" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create merge PR
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DATE_TAG=$(date +%Y%m%d)
          BRANCH="sync/upstream-$DATE_TAG"
          git checkout -b "$BRANCH" main

          # Normal merge — files we didn't touch auto-use upstream's version;
          # if both sides change the same file, conflict markers are left for review
          if git merge upstream/main --no-edit 2>/dev/null; then
            git push origin "$BRANCH"
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore: sync upstream changes ($DATE_TAG)" \
              --body "Automated merge from [redf0x1/camofox-browser](https://github.com/redf0x1/camofox-browser).\n\nUpstream: ${{ steps.check.outputs.upstream_sha }}" \
              --label "upstream-sync" || echo "PR may already exist for this branch"
          else
            # Merge failed (conflicts). Commit conflict markers and push for manual resolution
            git commit --no-edit -m "chore: merge upstream changes (with conflicts)" || true
            git push origin "$BRANCH" --force
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "⚠️ conflict: upstream sync needs manual resolution ($DATE_TAG)" \
              --body "Automatic merge from [redf0x1/camofox-browser](https://github.com/redf0x1/camofox-browser) detected conflicts.\n\nFiles with conflicts need manual resolution on the \`$BRANCH\` branch.\n\nReference: ${{ steps.check.outputs.upstream_sha }}" \
              --label "upstream-sync" || echo "PR may already exist"
          fi
